{% extends "base.html" %}

{% block title %}إنشاء حساب - DermaScan{% endblock %}

{% block content %}
    <style>
    .auth-container {
        min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        position: relative;
        overflow: hidden;
    }
    
    .auth-container::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grain" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="25" cy="25" r="1" fill="white" opacity="0.1"/><circle cx="75" cy="75" r="1" fill="white" opacity="0.1"/><circle cx="50" cy="10" r="0.5" fill="white" opacity="0.1"/><circle cx="10" cy="60" r="0.5" fill="white" opacity="0.1"/><circle cx="90" cy="40" r="0.5" fill="white" opacity="0.1"/></pattern></defs><rect width="100" height="100" fill="url(%23grain)"/></svg>');
        pointer-events: none;
    }
    
    .auth-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(20px);
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
        transition: all 0.3s ease;
    }
    
    .auth-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 35px 70px rgba(0, 0, 0, 0.2);
    }
    
    .auth-icon {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        font-size: 4rem;
            margin-bottom: 1rem;
        }
    
    .form-control, .form-select {
        border: 2px solid #e9ecef;
        border-radius: 12px;
        padding: 15px 20px;
        font-size: 16px;
        transition: all 0.3s ease;
        background: rgba(255, 255, 255, 0.9);
    }
    
    .form-control:focus, .form-select:focus {
        border-color: #667eea;
        box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        background: rgba(255, 255, 255, 1);
        }
    
        .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        border-radius: 12px;
        padding: 15px 30px;
        font-size: 16px;
        font-weight: 600;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
    }
    
    .btn-primary::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
        transition: left 0.5s;
    }
    
    .btn-primary:hover::before {
        left: 100%;
    }
    
    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
    }
    
    .form-label {
        color: #495057;
        font-weight: 600;
        margin-bottom: 8px;
    }
    
    .form-label i {
        color: #667eea;
    }
    
    .auth-title {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        font-weight: 700;
    }
    
    .auth-subtitle {
        color: #6c757d;
        font-size: 1.1rem;
    }
    
    .link-primary {
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
        transition: all 0.3s ease;
    }
    
    .link-primary:hover {
            color: #764ba2;
            text-decoration: underline;
        }
    
    .alert {
        border-radius: 12px;
        border: none;
        padding: 15px 20px;
    }
    
    .form-text {
        color: #6c757d;
        font-size: 0.9rem;
        margin-top: 5px;
    }
    
    .form-text i {
        color: #667eea;
    }
    
    .floating-shapes {
        position: absolute;
        width: 100%;
        height: 100%;
        overflow: hidden;
        pointer-events: none;
    }
    
    .shape {
        position: absolute;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        animation: float 6s ease-in-out infinite;
    }
    
    .shape:nth-child(1) {
        width: 80px;
        height: 80px;
        top: 20%;
        left: 10%;
        animation-delay: 0s;
    }
    
    .shape:nth-child(2) {
        width: 120px;
        height: 120px;
        top: 60%;
        right: 10%;
        animation-delay: 2s;
    }
    
    .shape:nth-child(3) {
        width: 60px;
        height: 60px;
        bottom: 20%;
        left: 20%;
        animation-delay: 4s;
    }
    
    @keyframes float {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-20px) rotate(180deg); }
    }
    
    .user-info-box {
        background: rgba(102, 126, 234, 0.05);
        border-radius: 12px;
        padding: 20px;
        border: 2px solid rgba(102, 126, 234, 0.1);
        margin-bottom: 20px;
        text-align: center;
    }
    
    .user-info-box i {
        font-size: 2rem;
        color: #667eea;
        margin-bottom: 10px;
    }
    
    .user-info-box h5 {
        color: #495057;
        margin-bottom: 10px;
    }
    
    .user-info-box p {
        color: #6c757d;
        margin-bottom: 0;
        }
    </style>

<div class="auth-container">
    <div class="floating-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>
    
    <div class="container-fluid">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-8 col-lg-6">
                <div class="auth-card">
                    <div class="card-body p-5">
                        <div class="text-center mb-5">
                            <div class="auth-icon mb-3">
                                <i class="fas fa-user-plus"></i>
                            </div>
                            <h2 class="auth-title mb-3">إنشاء حساب جديد</h2>
                            <p class="auth-subtitle">أدخل بياناتك لإنشاء حسابك كـ مستخدم عادي</p>
        </div>
                        
        <form method="POST" action="/register">
                            <div class="row">
                                <div class="col-md-6 mb-4">
                                    <label for="name" class="form-label">
                                        <i class="fas fa-user me-2"></i>الاسم الكامل
                                    </label>
                                    <input type="text" class="form-control" id="name" name="name" 
                                           placeholder="أدخل اسمك الكامل" required>
            </div>
                                
                                <div class="col-md-6 mb-4">
                                    <label for="email" class="form-label">
                                        <i class="fas fa-envelope me-2"></i>البريد الإلكتروني
                                    </label>
                                    <input type="email" class="form-control" id="email" name="email" 
                                           placeholder="أدخل بريدك الإلكتروني" required>
            </div>
            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-4">
                                    <label for="password" class="form-label">
                                        <i class="fas fa-lock me-2"></i>كلمة المرور
                                    </label>
                                    <input type="password" class="form-control" id="password" name="password" 
                                           placeholder="أدخل كلمة المرور" required>
            </div>
                                
                                <div class="col-md-6 mb-4">
                                    <label for="confirm_password" class="form-label">
                                        <i class="fas fa-lock me-2"></i>تأكيد كلمة المرور
                                    </label>
                                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" 
                                           placeholder="أعد إدخال كلمة المرور" required>
            </div>
            </div>
                            
                            <!-- حقل مخفي لنوع الحساب - دائماً مستخدم عادي -->
                            <input type="hidden" name="account_type" value="user">
                            
            {% if error %}
                            <div class="alert alert-danger d-flex align-items-center mb-4" role="alert">
                                <i class="fas fa-exclamation-triangle me-2"></i>
                {{ error }}
            </div>
            {% endif %}
            
            {% if success %}
                            <div class="alert alert-success d-flex align-items-center mb-4" role="alert">
                                <i class="fas fa-check-circle me-2"></i>
                {{ success }}
            </div>
            {% endif %}
                            
                            <div class="d-grid mb-4">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-user-plus me-2"></i>إنشاء الحساب
                                </button>
            </div>
        </form>
                        
                        <div class="text-center">
                            <p class="mb-0">
                                لديك حساب بالفعل؟ 
                                <a href="/login" class="link-primary">
                                    تسجيل الدخول
                                </a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
