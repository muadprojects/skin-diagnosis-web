{% extends "base.html" %}

{% block title %}DermaScan - مرحباً بك{% endblock %}

{% block content %}
<div class="splash-screen">
    <div class="splash-content">
        <div class="logo mb-3">
            <div class="logo-icon" style="width: 120px; height: 120px; background: linear-gradient(135deg, #3498db, #2c3e50); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
                <i class="fas fa-stethoscope" style="font-size: 3rem; color: white;"></i>
            </div>
        </div>
        <h1 class="display-4 fw-bold mb-3">DermaScan</h1>
        <p class="lead mb-4">تطبيق تشخيص الأمراض الجلدية بالذكاء الاصطناعي</p>
        <div class="loading-spinner"></div>
        <p class="mt-3">جاري التحميل...</p>
    </div>
</div>

<script>
    // الانتقال إلى صفحة تسجيل الدخول بعد 3 ثوانٍ
    setTimeout(function() {
        window.location.href = '/login';
    }, 3000);
</script>
{% endblock %}
